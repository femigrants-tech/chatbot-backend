<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femigrants - File Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .upload-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .upload-section h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="file"] {
            flex: 1;
            padding: 12px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            cursor: pointer;
            background: #f8f9ff;
        }

        .metadata-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-view {
            background: #3498db;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-view:hover {
            background: #2980b9;
        }

        .files-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .files-section h2 {
            margin-bottom: 20px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            font-size: 14px;
            padding: 8px 16px;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .file-card {
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .file-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .file-name {
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .file-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .file-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-available {
            background: #d4edda;
            color: #155724;
        }

        .status-processing {
            background: #fff3cd;
            color: #856404;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .metadata-display {
            background: #f8f9ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 Femigrants File Manager</h1>
            <p>Manage your knowledge base files</p>
        </div>

        <div id="alertContainer"></div>

        <div class="upload-section">
            <h2>📤 Upload New File</h2>
            <form class="upload-form" id="uploadForm">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" required>
                </div>
                <textarea 
                    class="metadata-input" 
                    id="metadataInput" 
                    placeholder='Optional: Add metadata as JSON (e.g., {"category": "documentation", "author": "admin"})'
                    rows="3"
                ></textarea>
                <button type="submit" class="btn btn-primary">Upload File</button>
            </form>
        </div>

        <div class="files-section">
            <h2>
                📚 Uploaded Files
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary refresh-btn" onclick="loadStatistics()">📊 Stats</button>
                    <button class="btn btn-primary refresh-btn" onclick="loadFiles()">🔄 Refresh</button>
                </div>
            </h2>
            <div id="statsContainer" style="display: none; padding: 15px; background: #f8f9ff; border-radius: 8px; margin-bottom: 20px;">
                <h3 style="margin-bottom: 10px; color: #333;">Storage Statistics</h3>
                <div id="statsContent"></div>
            </div>
            <div id="filesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading files...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        // Show alert message
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        // Get status class
        function getStatusClass(status) {
            if (status === 'Available') return 'status-available';
            if (status === 'Processing') return 'status-processing';
            return 'status-error';
        }

        // Load files from API
        async function loadFiles() {
            const container = document.getElementById('filesContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading files...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE_URL}/files`);
                const data = await response.json();

                if (!data.files || data.files.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                            </svg>
                            <h3>No files uploaded yet</h3>
                            <p>Upload your first file to get started!</p>
                        </div>
                    `;
                    return;
                }

                const filesGrid = document.createElement('div');
                filesGrid.className = 'files-grid';

                data.files.forEach(file => {
                    const fileCard = document.createElement('div');
                    fileCard.className = 'file-card';
                    
                    const metadataHtml = file.metadata && Object.keys(file.metadata).length > 0
                        ? `<div class="metadata-display"><strong>Metadata:</strong> ${JSON.stringify(file.metadata, null, 2)}</div>`
                        : '';

                    fileCard.innerHTML = `
                        <div class="file-name">📄 ${file.name}</div>
                        <div class="file-info">Size: ${formatFileSize(file.size)}</div>
                        <div class="file-info">Created: ${formatDate(file.created_on)}</div>
                        ${file.percent_done !== null ? `<div class="file-info">Progress: ${Math.round(file.percent_done * 100)}%</div>` : ''}
                        <span class="file-status ${getStatusClass(file.status)}">${file.status}</span>
                        ${metadataHtml}
                        <div class="file-actions">
                            <button class="btn btn-view" onclick="viewFile('${file.id}')">👁️ View</button>
                            <button class="btn btn-danger" onclick="deleteFile('${file.id}', '${file.name}')">🗑️ Delete</button>
                        </div>
                    `;

                    filesGrid.appendChild(fileCard);
                });

                container.innerHTML = '';
                container.appendChild(filesGrid);

            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p style="color: #e74c3c;">Error loading files: ${error.message}</p>
                        <button class="btn btn-primary" onclick="loadFiles()">Try Again</button>
                    </div>
                `;
            }
        }

        // View file details with preview
        async function viewFile(fileId) {
            try {
                // Get file preview
                const previewResponse = await fetch(`${API_BASE_URL}/documents/preview/${fileId}?max_length=300`);
                const fileData = await previewResponse.json();

                let details = `
📄 File Details
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

File ID: ${fileData.file_id}
Name: ${fileData.name}
Status: ${fileData.status}
Size: ${formatFileSize(fileData.size)}
Created: ${formatDate(fileData.created_on)}
`;

                if (fileData.metadata && Object.keys(fileData.metadata).length > 0) {
                    details += `\nMetadata: ${JSON.stringify(fileData.metadata, null, 2)}`;
                }

                if (fileData.preview && fileData.preview !== "Preview not available") {
                    details += `\n\n📖 Content Preview:\n${fileData.preview}`;
                }

                if (fileData.signed_url) {
                    details += `\n\n🔗 Download link available (expires in 1 hour)`;
                    if (confirm(`${details}\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\nWould you like to download the file?`)) {
                        window.open(fileData.signed_url, '_blank');
                    }
                } else {
                    alert(details);
                }

            } catch (error) {
                showAlert(`Error viewing file: ${error.message}`, 'error');
            }
        }

        // Delete file
        async function deleteFile(fileId, fileName) {
            if (!confirm(`Are you sure you want to delete "${fileName}"?\n\nThis action cannot be undone.`)) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/files/${fileId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert(`File "${fileName}" deleted successfully`, 'success');
                    loadFiles();
                } else {
                    const error = await response.json();
                    showAlert(`Error deleting file: ${error.detail}`, 'error');
                }

            } catch (error) {
                showAlert(`Error deleting file: ${error.message}`, 'error');
            }
        }

        // Upload file
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('fileInput');
            const metadataInput = document.getElementById('metadataInput');

            if (!fileInput.files || fileInput.files.length === 0) {
                showAlert('Please select a file', 'error');
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            // Validate and add metadata if provided
            if (metadataInput.value.trim()) {
                try {
                    JSON.parse(metadataInput.value);
                    formData.append('metadata', metadataInput.value);
                } catch (error) {
                    showAlert('Invalid JSON in metadata field', 'error');
                    return;
                }
            }

            // Disable submit button during upload
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Uploading...';

            try {
                const response = await fetch(`${API_BASE_URL}/files/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    showAlert(`File "${result.filename}" uploaded successfully! Processing...`, 'success');
                    
                    // Reset form
                    fileInput.value = '';
                    metadataInput.value = '';
                    
                    // Reload files after a short delay
                    setTimeout(() => loadFiles(), 2000);
                } else {
                    const error = await response.json();
                    showAlert(`Upload failed: ${error.detail}`, 'error');
                }

            } catch (error) {
                showAlert(`Upload failed: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Upload File';
            }
        });

        // Load statistics
        async function loadStatistics() {
            const statsContainer = document.getElementById('statsContainer');
            const statsContent = document.getElementById('statsContent');
            
            try {
                const response = await fetch(`${API_BASE_URL}/files/statistics`);
                const stats = await response.json();
                
                const statusBreakdown = Object.entries(stats.status_breakdown)
                    .map(([status, count]) => `<span style="margin-right: 15px;"><strong>${status}:</strong> ${count}</span>`)
                    .join('');
                
                statsContent.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px;">
                        <div>
                            <div style="font-size: 12px; color: #666;">Total Files</div>
                            <div style="font-size: 24px; font-weight: 600; color: #667eea;">${stats.total_files}</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #666;">Total Size</div>
                            <div style="font-size: 24px; font-weight: 600; color: #667eea;">${stats.total_size_mb} MB</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #666;">Metadata Keys</div>
                            <div style="font-size: 24px; font-weight: 600; color: #667eea;">${stats.metadata_keys_used.length}</div>
                        </div>
                    </div>
                    <div style="margin-top: 10px;">
                        <strong>Status Breakdown:</strong><br/>
                        <div style="margin-top: 5px;">${statusBreakdown}</div>
                    </div>
                    ${stats.metadata_keys_used.length > 0 ? `
                        <div style="margin-top: 10px;">
                            <strong>Metadata Keys:</strong> ${stats.metadata_keys_used.join(', ')}
                        </div>
                    ` : ''}
                `;
                
                // Toggle visibility
                if (statsContainer.style.display === 'none') {
                    statsContainer.style.display = 'block';
                } else {
                    statsContainer.style.display = 'none';
                }
                
            } catch (error) {
                showAlert(`Error loading statistics: ${error.message}`, 'error');
            }
        }

        // Load files on page load
        loadFiles();
    </script>
</body>
</html>
